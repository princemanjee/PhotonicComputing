<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Figure 3 placeholder: Electronic vs photonic signal comparison">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9e6"/>
      <stop offset="50%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#c6f5e3"/>
    </linearGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg3)"/>
  <g opacity="0.3" filter="url(#blur3)">
    <circle cx="300" cy="400" r="160" fill="#f59e0b"/>
    <circle cx="900" cy="400" r="160" fill="#06b6d4"/>
  </g>
  <rect x="60" y="140" width="500" height="600" rx="24" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
  <rect x="640" y="140" width="500" height="600" rx="24" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="26" fill="#0f172a">Electronic</text>
  <text x="310" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569">electrons in copper, RC-limited</text>
  <rect x="120" y="310" width="380" height="40" fill="#92400e" opacity="0.4"/>
  <circle cx="180" cy="330" r="14" fill="#f59e0b"/>
  <circle cx="260" cy="330" r="10" fill="#f59e0b" opacity="0.7"/>
  <circle cx="340" cy="330" r="8" fill="#f59e0b" opacity="0.5"/>
  <path d="M 140 500 Q 230 470 320 500 Q 410 530 500 500" stroke="#b45309" stroke-width="3" fill="none"/>
  <text x="310" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">RC charge/discharge delay</text>
  <rect x="120" y="610" width="380" height="60" rx="10" fill="rgba(255,255,255,0.8)"/>
  <text x="310" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#0f172a">RC delay, resistive heat</text>
  <text x="310" y="660" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">energy dissipated every toggle</text>
  <text x="890" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="26" fill="#0f172a">Photonic</text>
  <text x="890" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569">photons in silicon waveguide</text>
  <rect x="700" y="310" width="380" height="40" fill="#10b981" opacity="0.3"/>
  <path d="M 700 330 Q 750 310 800 330 Q 850 350 900 330 Q 950 310 1000 330 Q 1050 350 1080 330" stroke="#06b6d4" stroke-width="4" fill="none"/>
  <path d="M 700 490 Q 750 470 800 490 Q 850 510 900 490 Q 950 470 1000 490 Q 1050 510 1080 490" stroke="#ec4899" stroke-width="3" fill="none"/>
  <text x="890" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">no capacitance, no RC limit</text>
  <rect x="700" y="610" width="380" height="60" rx="10" fill="rgba(255,255,255,0.8)"/>
  <text x="890" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#0f172a">c in silicon, negligible dissipation</text>
  <text x="890" y="660" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">1 femtojoule per bit at 25 Gbps</text>
  <rect x="400" y="800" width="400" height="70" rx="18" fill="rgba(255,255,255,0.85)"/>
  <text x="600" y="830" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#0f172a">Figure 3</text>
  <text x="600" y="855" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">Electronic vs photonic signal transport</text>
</svg>
