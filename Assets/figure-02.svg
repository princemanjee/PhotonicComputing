    <circle cx="1400" cy="450" r="180" fill="#10b981"/>
  </g>
  <rect x="100" y="440" width="1400" height="20" rx="10" fill="url(#ray2)"/>
  <g font-family="system-ui, sans-serif" fill="#0f172a">
