      <text x="200" y="368" text-anchor="middle" font-weight="700" font-size="18">1945</text>
      <text x="200" y="392" text-anchor="middle" font-size="14">ENIAC</text>
    </g>
    <g>
      <circle cx="400" cy="450" r="20" fill="#ec4899" stroke="white" stroke-width="3"/>
