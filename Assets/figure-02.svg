  <rect x="600" y="780" width="400" height="80" rx="18" fill="rgba(255,255,255,0.85)"/>
  <text x="800" y="815" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#0f172a">Figure 2</text>
  <text x="800" y="845" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#1e293b">Computing evolution timeline</text>
