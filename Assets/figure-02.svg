      <text x="400" y="528" text-anchor="middle" font-weight="700" font-size="18">1947</text>
      <text x="400" y="552" text-anchor="middle" font-size="14">Transistor</text>
    </g>
    <g>
      <circle cx="600" cy="450" r="20" fill="#06b6d4" stroke="white" stroke-width="3"/>
      <rect x="520" y="340" width="160" height="70" rx="10" fill="rgba(255,255,255,0.85)"/>
      <text x="600" y="368" text-anchor="middle" font-weight="700" font-size="18">1970</text>
      <text x="600" y="392" text-anchor="middle" font-size="14">WDM concept</text>
    </g>
    <g>
      <circle cx="800" cy="450" r="20" fill="#10b981" stroke="white" stroke-width="3"/>
      <rect x="720" y="500" width="160" height="70" rx="10" fill="rgba(255,255,255,0.85)"/>
      <text x="800" y="528" text-anchor="middle" font-weight="700" font-size="18">1996</text>
      <text x="800" y="552" text-anchor="middle" font-size="14">DWDM commercial</text>
    </g>
    <g>
      <circle cx="1000" cy="450" r="20" fill="#f59e0b" stroke="white" stroke-width="3"/>
      <rect x="920" y="340" width="160" height="70" rx="10" fill="rgba(255,255,255,0.85)"/>
      <text x="1000" y="368" text-anchor="middle" font-weight="700" font-size="18">2005</text>
      <text x="1000" y="392" text-anchor="middle" font-size="14">Dennard ends</text>
    </g>
    <g>
      <circle cx="1200" cy="450" r="20" fill="#ec4899" stroke="white" stroke-width="3"/>
