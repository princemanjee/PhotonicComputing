<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 2 placeholder: Timeline of computing evolution">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9e6"/>
      <stop offset="50%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#c6f5e3"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="30%" stop-color="#ec4899"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <g opacity="0.3" filter="url(#blur2)">
