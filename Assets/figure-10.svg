<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 10 placeholder: Hybrid electronic-photonic architecture diagram">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9e6"/>
      <stop offset="50%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#c6f5e3"/>
    </linearGradient>
    <filter id="blur10"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow10"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg10)"/>
  <g opacity="0.25" filter="url(#blur10)">
    <circle cx="200" cy="600" r="200" fill="#06b6d4"/>
    <circle cx="1400" cy="300" r="200" fill="#ec4899"/>
  </g>
  <rect x="100" y="260" width="320" height="400" rx="22" fill="rgba(51,65,85,0.9)"/>
  <text x="260" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#f1f5f9">Electronic</text>
  <text x="260" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">CPU / GPU die</text>
  <g fill="#64748b" stroke="#94a3b8" stroke-width="1">
    <rect x="140" y="360" width="100" height="50" rx="6"/>
    <rect x="260" y="360" width="100" height="50" rx="6"/>
    <rect x="140" y="430" width="100" height="50" rx="6"/>
    <rect x="260" y="430" width="100" height="50" rx="6"/>
  </g>
  <g fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">
