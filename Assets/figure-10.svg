  <text x="1340" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#0f172a">Photonic Tensor</text>
  <text x="1340" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">Mach-Zehnder mesh</text>
  <g fill="rgba(255,255,255,0.8)" stroke="rgba(148,163,184,0.6)" stroke-width="1.5">
    <rect x="1220" y="360" width="60" height="40" rx="6"/>
    <rect x="1290" y="360" width="60" height="40" rx="6"/>
    <rect x="1360" y="360" width="60" height="40" rx="6"/>
    <rect x="1430" y="360" width="60" height="40" rx="6"/>
    <rect x="1255" y="410" width="60" height="40" rx="6"/>
    <rect x="1325" y="410" width="60" height="40" rx="6"/>
    <rect x="1395" y="410" width="60" height="40" rx="6"/>
    <rect x="1220" y="460" width="60" height="40" rx="6"/>
    <rect x="1290" y="460" width="60" height="40" rx="6"/>
    <rect x="1360" y="460" width="60" height="40" rx="6"/>
    <rect x="1430" y="460" width="60" height="40" rx="6"/>
  </g>
  <text x="1340" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">linear ops at &gt;100 GHz</text>
  <rect x="120" y="700" width="1360" height="90" rx="14" fill="rgba(255,255,255,0.9)"/>
  <text x="800" y="730" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="17" fill="#0f172a">OE / EO bottleneck</text>
  <text x="800" y="755" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">laser wall-plug efficiency approximately 10 percent</text>
  <text x="800" y="775" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">target sub-picojoule per bit, 10 ps conversion at 100 GHz bandwidth</text>
  <rect x="600" y="810" width="400" height="60" rx="16" fill="rgba(255,255,255,0.85)"/>
  <text x="800" y="840" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#0f172a">Figure 10</text>
  <text x="800" y="860" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">Hybrid electronic-photonic architecture</text>
</svg>
