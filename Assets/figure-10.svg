    <text x="310" y="390">Cache</text>
    <text x="190" y="460">Control</text>
    <text x="310" y="460">SRAM</text>
  </g>
  <text x="260" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">nonlinear ops, memory, control</text>
  <circle cx="460" cy="460" r="50" fill="#f59e0b" stroke="#fbbf24" stroke-width="4" filter="url(#glow10)"/>
  <text x="460" y="454" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="15" fill="#0f172a">E to O</text>
  <text x="460" y="476" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="#0f172a">convert</text>
  <rect x="560" y="280" width="480" height="360" rx="22" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
  <text x="800" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#0f172a">Photonic Interconnect</text>
  <text x="800" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">8-channel WDM waveguide</text>
  <g stroke-width="5" opacity="0.9">
    <line x1="600" y1="390" x2="1000" y2="390" stroke="#ef4444"/>
    <line x1="600" y1="420" x2="1000" y2="420" stroke="#f59e0b"/>
    <line x1="600" y1="450" x2="1000" y2="450" stroke="#eab308"/>
    <line x1="600" y1="480" x2="1000" y2="480" stroke="#10b981"/>
    <line x1="600" y1="510" x2="1000" y2="510" stroke="#06b6d4"/>
    <line x1="600" y1="540" x2="1000" y2="540" stroke="#3b82f6"/>
    <line x1="600" y1="570" x2="1000" y2="570" stroke="#a855f7"/>
    <line x1="600" y1="600" x2="1000" y2="600" stroke="#ec4899"/>
  </g>
  <circle cx="1080" cy="460" r="50" fill="#f59e0b" stroke="#fbbf24" stroke-width="4" filter="url(#glow10)"/>
  <text x="1080" y="454" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="15" fill="#0f172a">O to E</text>
  <text x="1080" y="476" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="#0f172a">convert</text>
