    <text x="640" y="720" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#0f172a">64.0</text>
    <text x="640" y="745" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Blackwell 8-core</text>
  </g>
  <g>
    <rect x="760" y="680" width="120" height="36" transform="translate(0 -36)" fill="#ec4899" rx="4" opacity="0.85"/>
