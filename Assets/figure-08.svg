    <text x="280" y="745" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Intel Core X</text>
  </g>
  <g>
    <rect x="400" y="617" width="120" height="63" fill="#10b981" rx="4" opacity="0.85"/>
