<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Figure 8 placeholder: Bandwidth comparison bar chart">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9e6"/>
      <stop offset="50%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#c6f5e3"/>
    </linearGradient>
    <filter id="blur8"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg8)"/>
